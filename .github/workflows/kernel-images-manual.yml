name: Kernel (manual) - Build and release

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64

defaults:
  run:
    working-directory: kernel

jobs:
  release-firecracker-amd64:
    if: inputs.arch == 'amd64'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: [4.19.215, 5.10.77, 6.1.102]
    env:
      REGISTRY: ghcr.io/${{ vars.REGISTRY_OWNER || github.repository_owner }}
      ARCH: amd64
      FC_KERNEL_VERSIONS: ${{ matrix.version }}
      PUSH: --push
    steps:
      - uses: actions/checkout@v4
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make build-fc
          make push-fc
  release-firecracker-arm64:
    if: inputs.arch == 'arm64'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: [5.10.77, 6.1.102]
    env:
      REGISTRY: ghcr.io/${{ vars.REGISTRY_OWNER || github.repository_owner }}
      ARCH: arm64
      FC_KERNEL_VERSIONS: ${{ matrix.version }}
      PUSH: --push
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make build-fc
          make push-fc
  release-cloudhypervisor:
    if: inputs.arch == 'amd64'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: [5.12, 5.15.12]
    env:
      REGISTRY: ghcr.io/${{ vars.REGISTRY_OWNER || github.repository_owner }}
      ARCH: amd64
      CH_KERNEL_VERSIONS: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make build-ch
          make push-ch
