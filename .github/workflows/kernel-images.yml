name: Build and release kernel images

on:
  pull_request:
    paths:
      - 'kernel/**'
    branches: [main]
  push:
    paths:
      - 'kernel/**'
    branches: [main, issue/*]
  workflow_dispatch:

defaults:
  run:
    working-directory: kernel

jobs:
  build-firecracker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # arm64 has configs only for 5.10.77 and 6.1.102
        include:
          - arch: amd64
            version: 4.19.215
          - arch: amd64
            version: 5.10.77
          - arch: amd64
            version: 6.1.102
          - arch: arm64
            version: 5.10.77
          - arch: arm64
            version: 6.1.102
    env:
      ARCH: ${{ matrix.arch }}
      FC_KERNEL_VERSIONS: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx (arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-buildx-action@v3
      - name: Build kernel
        run: make build-fc
  build-cloudhypervisor:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version: [5.12, 5.15.12]
    env:
      ARCH: amd64
      CH_KERNEL_VERSIONS: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Build kernel
        run: make build-ch
  release-firecracker:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            version: 4.19.215
          - arch: amd64
            version: 5.10.77
          - arch: amd64
            version: 6.1.102
          - arch: arm64
            version: 5.10.77
          - arch: arm64
            version: 6.1.102
    env:
      REGISTRY: ghcr.io/${{ vars.REGISTRY_OWNER || github.repository_owner }}
      ARCH: ${{ matrix.arch }}
      FC_KERNEL_VERSIONS: ${{ matrix.version }}
      PUSH: --push
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx (arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-buildx-action@v3
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make build-fc
          make push-fc
  release-cloudhypervisor:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: [5.12, 5.15.12]
    env:
      REGISTRY: ghcr.io/${{ vars.REGISTRY_OWNER || github.repository_owner }}
      ARCH: amd64
      CH_KERNEL_VERSIONS: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          make build-ch
          make push-ch
